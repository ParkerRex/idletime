name: Publish idletime

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version from package.json to publish
        required: true
        type: string

concurrency:
  group: publish-idletime
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify publish runs from main
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Publish workflow must run from main, got $GITHUB_REF_NAME." >&2
            exit 1
          fi

      - name: Verify package version matches workflow input
        run: |
          package_version=$(node -p "require('./package.json').version")
          if [ "$package_version" != "$RELEASE_VERSION" ]; then
            echo "package.json version $package_version does not match requested $RELEASE_VERSION." >&2
            exit 1
          fi

      - name: Verify release version is still unpublished
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package_name=$(node -p "require('./package.json').name")
          git fetch --tags --force

          if git show-ref --verify --quiet "refs/tags/v$RELEASE_VERSION"; then
            echo "Git tag v$RELEASE_VERSION already exists." >&2
            exit 1
          fi

          if gh release view "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "GitHub release v$RELEASE_VERSION already exists." >&2
            exit 1
          fi

          if npm view "$package_name@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "$package_name@$RELEASE_VERSION is already published on npm." >&2
            exit 1
          fi

      - name: Run release checks
        run: bun run check:release

      - name: Preview publish tarball
        run: npm pack --json --pack-destination "$RUNNER_TEMP"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            --title "v$RELEASE_VERSION"
